<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>of deep origin</title>
  <meta name="description" content="of deep origin LLC" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 56px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 40px 0 0;
    }

    h1 {
      font-family: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
      font-size: clamp(80px, 14vw, 180px);
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 0.85;
    }

    h1 em {
    }
    h1 span {
      display: block;
    }
    .text-wrapper {
      position: relative;
      display: inline-block;
      animation: breathe 30s ease-in-out infinite;
      transform-origin: left top;
      -webkit-box-reflect: below 8px linear-gradient(transparent, rgba(0,0,0,0.5));
    }
    .gradient-text, .black-text {
      display: inline-block;
      padding-top: 0.3em;
      padding-bottom: 0.3em;
    }
    .gradient-text {
      background: linear-gradient(135deg, #ffd9a0, #ff9500, #ff4500, #ff2050, #cc0088, #cc0066, #8800ff, #5500aa, #ff9500, #ffd9a0);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 0;
      filter: drop-shadow(0 0 12px rgba(136, 0, 255, 0.3)) drop-shadow(0 0 28px rgba(204, 0, 136, 0.12));
      animation: gradientFlow 180s ease infinite;
    }
    .black-text {
      position: absolute;
      top: 1px;
      left: 2px;
      color: #0f0f0f;
      z-index: 1;
      user-select: none;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.012, 1.008); }
    }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    footer {
      font-size: 11px;
      font-weight: 300;
      color: #333333;
      letter-spacing: 0.04em;
    }

    @media (max-width: 600px) {
      body { padding: 36px 28px; }
    }
  </style>
</head>
<body>

<main>
    <h1>
      <div class="text-wrapper">
        <div class="black-text" aria-hidden="true">
          <span style="padding-left: 0;">of</span>
          <span style="padding-left: 0.5em;">deep</span>
          <span style="padding-left: 1em;">origin</span>
        </div>
        <div class="gradient-text">
          <span style="padding-left: 0;">of</span>
          <span style="padding-left: 0.5em;">deep</span>
          <span style="padding-left: 1em;">origin</span>
        </div>
      </div>
    </h1>
  </main>

  <footer>© 2026 of deep origin LLC</footer>

</body>
</html>
